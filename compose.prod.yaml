# Production-shaped stack: nginx → php-fpm app, a dedicated queue worker for
# the queued listeners, MySQL and Redis. Demo of the deployment topology —
# point real deployments at managed MySQL/Redis and inject secrets properly.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.production
    environment:
      RUN_MIGRATIONS: 'true'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ['CMD-SHELL', 'php artisan inspire > /dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '${APP_PORT:-8080}:80'
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost/up || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ['php', 'artisan', 'queue:work', 'redis', '--tries=3', '--backoff=10', '--max-time=3600']
    env_file: .env.production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: '${DB_DATABASE:-laravel_saas}'
      MYSQL_USER: '${DB_USERNAME:-laravel}'
      MYSQL_PASSWORD: '${DB_PASSWORD:?set DB_PASSWORD}'
      MYSQL_RANDOM_ROOT_PASSWORD: 'yes'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', '${DB_USERNAME:-laravel}', '-p${DB_PASSWORD}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
