name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: ['pint', 'phpstan']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - uses: ramsey/composer-install@v3
      - name: pint
        if: matrix.task == 'pint'
        run: vendor/bin/pint --test
      - name: phpstan
        if: matrix.task == 'phpstan'
        run: vendor/bin/phpstan analyse --no-progress

  tests:
    name: pest
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: testing
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 33061:3306
        options: >-
          --health-cmd="mysqladmin ping -ppassword"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 33061
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: password
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - uses: ramsey/composer-install@v3
      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate
      - name: Run Pest
        run: php artisan test
